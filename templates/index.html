<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>itsyou</title>
  <!-- PWA: 홈 화면에 설치하면 전체화면 앱처럼 실행된다 -->
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <link rel="apple-touch-icon" href="/static/icon-192.png">
  <link rel="stylesheet" href="/static/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
  <script src="/static/qrcode.min.js"></script>
</head>
<body>

  <!-- 화면 0: 키 설정 -->
  <div id="screen-setup" class="screen">
    <div class="setup-wrap">
      <h1 class="setup-title">itsyou</h1>
      <p class="setup-sub">AI 포토부스를 시작하려면 API 키를 입력하세요.</p>
      <label class="setup-label">AI 제공자
        <select id="setup-provider">
          <option value="gemini">Google Gemini</option>
          <option value="openai">OpenAI</option>
        </select>
      </label>
      <input id="setup-key" class="setup-input" type="password" placeholder="API 키 붙여넣기" autocomplete="off">
      <button id="setup-save" class="setup-btn">시작하기</button>
      <p id="setup-msg" class="setup-msg"></p>
    </div>
  </div>

  <!-- 화면 1: 카메라 -->
  <div id="screen-camera" class="screen">
    <div class="cam-header">
      <button id="btn-flip" class="icon-btn" aria-label="카메라 전환">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 19H4a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h5"/>
          <path d="M13 5h7a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2h-5"/>
          <circle cx="12" cy="12" r="3"/>
          <path d="m18 22-3-3 3-3"/>
          <path d="m6 2 3 3-3 3"/>
        </svg>
      </button>
      <p id="cam-title" class="cam-title" role="button" tabindex="0"
         aria-label="프롬프트 수정">It's you <span></span></p>
      <button id="btn-fullscreen" class="icon-btn" aria-label="전체화면">⛶</button>
    </div>
    <div class="cam-viewport">
      <video id="video" autoplay playsinline muted></video>
      <!-- 카운트다운 오버레이 -->
      <div id="countdown-overlay" class="countdown-overlay hidden">
        <span id="countdown-num"></span>
      </div>
    </div>
    <div class="cam-footer">
      <div id="preset-list" class="preset-list" role="list"></div>
      <button id="btn-shutter" class="shutter-btn" aria-label="촬영">●</button>
      <p id="shutter-hint" class="shutter-hint">버튼을 누르면 5초 후에 촬영됩니다.</p>
    </div>
  </div>

  <!-- 화면 2: 생성 중 -->
  <div id="screen-loading" class="screen">
    <div class="loading-wrap">
      <img id="loading-preview" class="loading-preview" alt="">
      <div class="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-preset-name" class="loading-title">변환 중...</p>
        <p class="loading-sub">약 15초 소요됩니다</p>
      </div>
    </div>
  </div>

  <!-- 화면 3: 결과 -->
  <div id="screen-result" class="screen">
    <div class="result-img-wrap">
      <img id="result-image" class="result-img" alt="생성된 이미지">
    </div>
    <div class="result-footer">
      <div class="btn-row">
        <button id="btn-qr"    class="share-btn">QR 코드</button>
        <button id="btn-download" class="share-btn">저장</button>
      </div>
      <div class="btn-row">
        <button id="btn-share" class="share-btn">공유하기</button>
        <button id="btn-print" class="share-btn">인쇄 🖨</button>
      </div>
      <button id="btn-retry" class="retry-btn">다시 찍기</button>
      <p class="auto-return-hint"><span id="auto-return-count">30</span>초 후 자동으로 처음으로 돌아갑니다</p>
    </div>
  </div>

  <!-- 프롬프트 수정 모달 -->
  <div id="modal-prompt" class="modal hidden">
    <div class="modal-box">
      <h3 id="prompt-modal-title">프롬프트 수정</h3>
      <p class="modal-sub" id="prompt-modal-sub">선택한 스타일의 AI 변환 프롬프트를 수정합니다.</p>
      <textarea id="prompt-textarea" class="prompt-textarea" rows="8"
                placeholder="이 스타일의 프롬프트를 입력하세요"></textarea>
      <p id="prompt-modal-msg" class="prompt-modal-msg"></p>
      <div class="btn-row">
        <button id="btn-prompt-save" class="share-btn">저장</button>
        <button id="btn-prompt-close" class="modal-close">닫기</button>
      </div>
    </div>
  </div>

  <!-- QR 모달 -->
  <div id="modal-qr" class="modal hidden">
    <div class="modal-box">
      <h3>QR 코드로 저장</h3>
      <div id="qr-container" class="qr-container"></div>
      <p class="modal-sub">카메라로 스캔하면 사진을 받을 수 있어요</p>
      <button id="btn-qr-close" class="modal-close">닫기</button>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    // PWA 서비스워커 등록(설치 가능 조건 충족). 실패해도 앱 동작엔 영향 없음.
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(() => {});
    }
  </script>
</body>
</html>
